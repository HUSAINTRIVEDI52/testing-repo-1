image: atlassian/default-image:latest

pipelines:
 branches:
   dev:
     - step:
         name: sonarqube
         runs-on:
           - self.hosted
           - linux.shell
         script:
           - sonar-scanner
               -Dsonar.projectKey=$SONAR_PROJECT_KEY
               -Dsonar.sources=.
               -Dsonar.host.url=$SONAR_HOST_URL
               -Dsonar.login=$SONAR_TOKEN